services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lumnicode
      POSTGRES_PASSWORD: lumnicode
      POSTGRES_DB: lumnicode
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lumnicode
      MINIO_ROOT_PASSWORD: lumnicode123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 lumnicode lumnicode123;
      mc mb --ignore-existing local/lumnicode-files;
      echo 'Bucket created successfully';
      "

volumes:
  pgdata:
  miniodata:
